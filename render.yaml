services:
  - type: web
    name: gglads
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -e .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn gglads.web.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false

  # 04:00 UTC — full catalog + sales + inventory snapshot.
  - type: cron
    name: gglads-shopify-full
    runtime: python
    schedule: "0 4 * * *"
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: python -m gglads.cron.shopify_sync
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false

  # 16:00 UTC — sales only (orders + today's snapshot). Much faster.
  - type: cron
    name: gglads-shopify-sales
    runtime: python
    schedule: "0 16 * * *"
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: python -m gglads.cron.shopify_sync_sales
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false

  # 03:00 UTC — regenerate stale RSA copy to pending (awaiting user approval)
  # and pause Google Ads previous ads whose 24h grace window has elapsed.
  - type: cron
    name: gglads-ad-copy-maintenance
    runtime: python
    schedule: "0 3 * * *"
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: python -m gglads.cron.ad_copy_maintenance
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false
