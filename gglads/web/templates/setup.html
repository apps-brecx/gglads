<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First-time setup — gglads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/motion.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <h1>gglads</h1>
        <p>Create the first admin account</p>
      </div>

      <form method="post" action="/setup" class="auth-form" novalidate>
        {% if error %}
        <div class="auth-error" role="alert">{{ error }}</div>
        {% endif %}

        <div class="field">
          <label for="name">Your name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Eli"
            autocomplete="name"
            required
          />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <label for="password">Choose a password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </div>

        <button type="submit" class="btn-primary">Create admin account</button>
      </form>

      <div class="auth-footer">
        This is a one-time setup. Once an account exists, this page is disabled.
      </div>
    </div>

    <div class="auth-meta">gglads · v{{ version }}</div>
  </main>
</body>
</html>
