services:
  - type: web
    name: gglads
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -e .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn gglads.web.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false

  # 04:00 UTC — full catalog + sales + inventory snapshot.
  - type: cron
    name: gglads-shopify-full
    runtime: python
    schedule: "0 4 * * *"
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: python -m gglads.cron.shopify_sync
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false

  # 16:00 UTC — second full sync of the day (catalog + orders + snapshot).
  # Inventory refreshes twice a day so OOS state never lags more than ~12h.
  # (The script file is still named shopify_sync_sales for backwards-compat
  # with the render.yaml entry name — but it now runs a full sync.)
  - type: cron
    name: gglads-shopify-sales
    runtime: python
    schedule: "0 16 * * *"
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: python -m gglads.cron.shopify_sync_sales
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false

  # 03:00 UTC — regenerate stale RSA copy to pending (awaiting user approval)
  # and pause Google Ads previous ads whose 24h grace window has elapsed.
  - type: cron
    name: gglads-ad-copy-maintenance
    runtime: python
    schedule: "0 3 * * *"
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: python -m gglads.cron.ad_copy_maintenance
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false

  # 05:00 UTC daily — per-product Search Console snapshot into
  # product_keyword_history. Powers the dashboard growth-alerts panel.
  - type: cron
    name: gglads-keyword-history
    runtime: python
    schedule: "0 5 * * *"
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: python -m gglads.cron.keyword_history_sweep
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false

  # Mondays 06:00 UTC — AI-generate new collection suggestions from
  # site-wide organic queries. Lands as pending rows on /collections.
  - type: cron
    name: gglads-collection-suggestions
    runtime: python
    schedule: "0 6 * * 1"
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: python -m gglads.cron.collection_suggestions_sweep
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_SECRET
        sync: false
      - key: DRY_RUN
        sync: false
      - key: AUTONOMOUS_MODE
        sync: false
