<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — gglads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/motion.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <h1>gglads</h1>
        <p>Sign in to the portal</p>
      </div>

      <form method="post" action="/login" class="auth-form" novalidate>
        {% if error %}
        <div class="auth-error" role="alert">{{ error }}</div>
        {% endif %}

        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <div class="field-row">
            <label for="password">Password</label>
            <a href="/forgot-password" class="muted-link">Forgot password?</a>
          </div>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <div class="auth-footer">
        Access is invite-only. Ask an admin for an invite.
      </div>
    </div>

    <div class="auth-meta">gglads · v{{ version }}</div>
  </main>
</body>
</html>
